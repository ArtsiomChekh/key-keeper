name: CD

on:
  workflow_run:
    workflows: [ CI ]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Configure kubectl
        run: | 
          mkdir -p $HOME/.kube 
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config 
          kubectl config view
      - name: Get Pods
        run: kubectl get pods
